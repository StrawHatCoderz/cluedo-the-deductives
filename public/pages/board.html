    <div id="players-cards-details"></div>

    <div id="weapon-popup" class="weapon-popup hidden"></div>
    <div class="action-buttons" class="hide">
      <button id="accuse-button">
        <img src="/assets/accuse.svg" alt="accuse">
        <span class="tooltip">Accuse</span>
      </button>
      <button id="dice-button">
        <img src="/assets/dice.svg" alt="dice">
        <span class="tooltip">Roll Dice</span>
      </button>
      <button id="pass-button">
        <img src="/assets/pass.svg" alt="pass">
        <span class="tooltip">Pass</span>
      </button>
    </div>

    <div class="popup">
      <div class="popup-dot"></div>
      <p></p>
    </div>

    <div id="tooltip" class="tooltip hidden"></div>

    <template id="player-template">
      <div class="player">
        <img class="player-icon" src="" alt="">
        <div class="player-info">
          <span class="player-name"></span>
          <div class="player-pawn-details">
            <span class="player-pawn-color"></span>
            <span class="player-pawn"></span>
          </div>
        </div>
      </div>
    </template>

    <template id="card-template">
      <div class="card">
        <img class="player-card" src="" alt="" />
      </div>
    </template>

    <template id="suspicion-container-template">
      <div id="suspicion-container">
        <h2>Suspicion</h2>
        <p class="modal-room-label"></p>
        <div class="suspicion-cards"></div>
        <p id="suspicion-status" class="waiting-text">
          ....Waiting for players to disprove
        </p>
      </div>
    </template>

    <template id="announce-suspicion-template">
      <div id="announce-container">
        <h2>Suspicion</h2>
        <p class="modal-room-label" id="suspector"></p>
        <div class="suspicion-cards">
          <div class="dis-card" id="dis-suspect">
            <input type="radio" name="disprove" id="suspect" value="suspect" />

            <img class="player-card" src="" alt="">
          </div>
          <div class="dis-card" id="dis-weapon">
            <input type="radio" name="disprove" id="weapon" value="weapon" />

            <img class="player-card" src="" alt="">
          </div>

          <div class="dis-card" id="dis-room">
            <input type="radio" name="disprove" id="room" value="room" />

            <img class="player-card" src="" alt="">
          </div>
        </div>
      </div>
    </template>

    <template id="disprove-model-template">
      <div id="disproval-container">
        <form action="/game/disprove" method="post">
          <h2>Disprove Suspicion</h2>
          <p class="modal-room-label">Select a card to challenge the claim</p>
          <div class="suspicion-cards">
            <div class="dis-card" id="dis-suspect">
              <input
                type="radio"
                name="disprove"
                id="suspect"
                value="suspect"
                required
              />
              <label class="sus-card" for="suspect">
                <img class="player-card" src="" alt="">
              </label>
            </div>
            <div class="dis-card" id="dis-weapon">
              <input
                type="radio"
                name="disprove"
                id="weapon"
                value="weapon"
                required
              />
              <label class="sus-card" for="weapon">
                <img class="player-card" src="" alt="">
              </label>
            </div>

            <div class="dis-card" id="dis-room">
              <input
                type="radio"
                name="disprove"
                id="room"
                value="room"
                required
              />
              <label class="sus-card" for="room">
                <img class="player-card" src="" alt="">
              </label>
            </div>
          </div>

          <button type="submit">Confirm Selection</button>
        </form>
      </div>
    </template>

    <template id="overlay-template">
      <article id="content">
        <slot></slot>
      </article>
    </template>

    <template id="accusation-form-template">
      <form action="" id="accusation-form">
        <legend>Suspects</legend>
        <div class="options" id="suspects"></div>
        <legend>Weapons</legend>
        <div class="options" id="weapons"></div>
        <legend>Rooms</legend>
        <div class="options" id="rooms"></div>
        <div id="actions">
          <button type="reset">Reset</button>
          <button type="submit">Accuse</button>
        </div>
      </form>
    </template>

    <template id="accusation-info-template">
      <div id="accusation-info">
        <p id="accusation-status"></p>
        <div id="accusation-result-combination"></div>
      </div>
    </template>

    <template id="option-template">
      <div class="option">
        <input type="radio" />
        <label></label>
      </div>
    </template>

    <template id="weapon-popup-temp">
      <div id="weapon-popup-info">
        <div class="weapon-popup-suspect" id="weapon-popup-suspect"></div>
        <div class="weapon-popup-room" id="weapon-popup-room"></div>
      </div>
      <div class="weapon-selected-label" id="weapon-selected-label">
        Select a weapon
      </div>
      <div class="weapon-cards-row" id="weapon-cards-row"></div>
      <div class="weapon-popup-actions">
        <button class="weapon-btn weapon-btn-confirm" id="weapon-suspect-btn">
          Suspect
        </button>
        <button class="weapon-btn weapon-btn-cancel" id="weapon-cancel-btn">
          Cancel
        </button>
      </div>
    </template>

    <template id="weapon-card-temp">
      <div class="weapon-item">
        <img class="weapon-img" src="" alt="" />
        <span class="weapon-name tooltip"></span>
      </div>
    </template>
  </body>
