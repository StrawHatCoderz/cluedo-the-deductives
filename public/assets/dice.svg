<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.2" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Back die -->
  <rect
    x="10"
    y="10"
    width="26"
    height="26"
    rx="5"
    fill="#F5F5F5"
    stroke="#8B1E2D"
    stroke-width="1.5"
    filter="url(#shadow)"
  />
  <circle cx="17" cy="17" r="2" fill="#8B1E2D" />
  <circle cx="29" cy="29" r="2" fill="#8B1E2D" />

  <!-- Front die -->
  <rect
    x="24"
    y="24"
    width="26"
    height="26"
    rx="5"
    fill="#FFFFFF"
    stroke="#8B1E2D"
    stroke-width="1.5"
    filter="url(#shadow)"
  />
  <circle cx="31" cy="31" r="2" fill="#8B1E2D" />
  <circle cx="43" cy="31" r="2" fill="#8B1E2D" />
  <circle cx="31" cy="43" r="2" fill="#8B1E2D" />
  <circle cx="43" cy="43" r="2" fill="#8B1E2D" />
</svg>
